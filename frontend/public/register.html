<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart School Transport</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>Create an Account</h1>
                <p>Join the Smart School Transport system</p>
            </div>

            <form id="unifiedRegisterForm" class="auth-form">
                <div class="form-group">
                    <label>I am a:</label>
                    <div class="role-selector" style="display: flex; gap: 20px; margin-top: 10px; margin-bottom: 20px;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="radio" name="role" value="parent" checked> Parent
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="radio" name="role" value="driver"> Driver
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <div class="input-icon">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                    </div>
                </div>

                <!-- Parent Specific Fields -->
                <div id="parentFields" class="role-specific-fields">
                    <div class="form-group">
                        <label for="studentId">Student ID (Optional)</label>
                        <div class="input-icon">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="studentId" name="studentId" placeholder="Enter your child's Student ID">
                        </div>
                    </div>
                </div>

                <!-- Driver Specific Fields -->
                <div id="driverFields" class="role-specific-fields" style="display: none;">
                    <div class="form-group">
                        <label for="licenseNumber">License Number</label>
                        <div class="input-icon">
                            <i class="fas fa-id-badge"></i>
                            <input type="text" id="licenseNumber" name="licenseNumber" placeholder="Enter your license number">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Create a password" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-user-plus"></i>
                        Register
                    </button>
                    <a href="landing.html" class="btn btn-outline">
                        <i class="fas fa-arrow-left"></i>
                        Back to Home
                    </a>
                </div>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="toast-icon"></span>
        <span class="toast-message"></span>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
