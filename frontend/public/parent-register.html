<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Registration - Smart School Transport</title>
    <link rel="stylesheet" href="css/parent-auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-background">
            <div class="glass-overlay"></div>
        </div>
        
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-bus"></i>
                    <h1>Smart Transport</h1>
                </div>
                <h2>Parent Registration</h2>
                <p>Create your parent account to track your child's transport</p>
            </div>

            <form id="parentRegisterForm" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName">
                            <i class="fas fa-user"></i>
                            Full Name
                        </label>
                        <input type="text" id="fullName" name="fullName" required placeholder="e.g., Jean-Pierre Niyonzima">
                    </div>
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Email Address
                        </label>
                        <input type="email" id="email" name="email" required placeholder="e.g., parent@smarttransport.rw">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">
                            <i class="fas fa-phone"></i>
                            Phone Number
                        </label>
                        <input type="tel" id="phone" name="phone" required placeholder="+250 788 123 456">
                    </div>
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <input type="password" id="password" name="password" required placeholder="Create a strong password">
                    </div>
                </div>

                <div class="form-group">
                    <label for="studentId">
                        <i class="fas fa-child"></i>
                        Linked Student ID
                    </label>
                    <select id="studentId" name="studentId" required>
                        <option value="">Select your child's student ID</option>
                        <option value="1">STU001 - Mutesa Kayitesi</option>
                        <option value="2">STU002 - Jean-Pierre Niyonzima</option>
                        <option value="3">STU003 - Grace Mukamana</option>
                    </select>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="terms" name="terms" required>
                        <span class="checkmark"></span>
                        I agree to the terms and conditions
                    </label>
                </div>

                <button type="submit" class="auth-btn">
                    <i class="fas fa-user-plus"></i>
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="parent-login.html">Sign In</a></p>
                <div class="auth-links">
                    <a href="landing.html" class="back-link">
                        <i class="fas fa-arrow-left"></i>
                        Back to Home
                    </a>
                    <div class="role-links">
                        <a href="admin-login.html">Admin</a>
                        <a href="driver-login.html">Driver</a>
                        <a href="parent-login.html">Parent</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
        </div>
    </div>

    <div id="toast" class="toast">
        <span class="toast-icon"></span>
        <span class="toast-message"></span>
    </div>

    <script src="js/parent-register.js"></script>
</body>
</html>
