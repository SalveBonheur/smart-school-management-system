services:
  # Web Service (Node.js + React)
  - type: web
    name: smart-school-transport
    env: node
    plan: free
    buildCommand: "npm run build:prod"
    startCommand: "npm start"
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_TYPE
        value: sqlite
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CORS_ORIGIN
        value: https://smart-school-transport.onrender.com

  # PostgreSQL Database (optional - if you prefer PostgreSQL over SQLite)
  # Uncomment the following section to use PostgreSQL instead of SQLite
  # - type: postgres
  #   name: smart-school-transport-db
  #   plan: free
  #   ipAllowList: []
  #   databaseName: smart_school_transport
  #   user: smart_school_user
